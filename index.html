<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>🐹 布丁相册</title>
<style>
:root {
    --bg: #fff8f3;
    --card: #fff;
    --accent: #ffd6c4;
    --text: #5c3d2e;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 12px;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
}

header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: linear-gradient(135deg, #ffe8dc, #ffd1c2);
    padding: 14px;
    border-radius: 18px;
    margin-bottom: 14px;
    text-align: center;
}
.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #fff;
    box-shadow: 0 4px 12px rgba(255,180,150,.4);
    margin-bottom: 8px;
}
header h1 { margin: 0; font-size: 1.4rem; }
header p { margin: 4px 0 0; font-size: 0.82rem; opacity: 0.75; }

.gallery {
    column-count: 2;
    column-gap: 10px;
}

.photo-card {
    break-inside: avoid;
    background: var(--card);
    border-radius: 16px;
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(255,180,150,.25);
    transition: transform .2s;
}
.photo-card:active { transform: scale(.97); }

.photo-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    object-position: center;
    display: block;
    background: #f3e8e0;
}

/* 灯箱 */
.lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    touch-action: pan-x;
}
.lightbox img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}
.close {
    position: absolute; top: env(safe-area-inset-top, 16px); right: 16px;
    font-size: 32px; color: #fff;
}
.nav {
    position: absolute; bottom: env(safe-area-inset-bottom, 30px);
    width: 100%; display: flex; justify-content: space-around;
}
.nav button {
    background: rgba(255,255,255,.2);
    border: none; color: #fff;
    font-size: 22px; padding: 10px 22px;
    border-radius: 30px;
}
</style>
</head>
<body>

<header>
    <img class="avatar" src="https://static-mp-c8722c76-514e-412d-b415-11ef018f9936.next.bspapp.com/img/buding.jpg" alt="布丁仓鼠头像">
    <h1>🐹 布丁相册</h1>
    <p>点击照片查看完整原图</p>
</header>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeBox()">✕</span>
    <img id="lbImg">
    <div class="nav">
        <button onclick="prev()">◀</button>
        <button onclick="next()">▶</button>
    </div>
</div>

<script>
const photos = Array.from({length: 22}, (_, i) => 
    `https://cdn.jsdelivr.net/gh/kldby666/piccdn/img/buding${i+1}.png`
);

const gallery = document.getElementById("gallery");
let current = 0;

photos.forEach((src, i) => {
    const card = document.createElement("div");
    card.className = "photo-card";
    card.innerHTML = `
        <img src="${src}" loading="lazy" onclick="openBox(${i})">
    `;
    gallery.appendChild(card);
});

function openBox(i) {
    current = i;
    document.getElementById("lbImg").src = photos[i];
    document.getElementById("lightbox").style.display = "flex";
}
function closeBox() {
    document.getElementById("lightbox").style.display = "none";
}
function prev() { openBox((current - 1 + photos.length) % photos.length); }
function next() { openBox((current + 1) % photos.length); }

document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeBox();
});
</script>
</body>
</html>
